name: Bug
description: 버그 수정 작업을 위한 이슈 템플릿
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: current
    attributes:
      label: 현재 동작
      description: 지금 어떤 문제가 발생하는지 적어주세요.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 원래 어떻게 동작해야 하는지 적어주세요.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 재현 방법
      description: 재현 절차를 순서대로 적어주세요.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
