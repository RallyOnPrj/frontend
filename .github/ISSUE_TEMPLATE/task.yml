name: Task
description: 문서/설정/리팩터링 등 일반 작업용 이슈 템플릿
title: "[Task] "
labels:
  - task
body:
  - type: textarea
    id: goal
    attributes:
      label: 작업 목표
      description: 이번 작업에서 달성하려는 목표를 적어주세요.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      description: 수정 대상과 제외 범위를 적어주세요.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 참고 사항
      description: 구현/운영 시 주의할 점이 있다면 적어주세요.
